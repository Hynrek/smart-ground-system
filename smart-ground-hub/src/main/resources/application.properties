server.port=8080

# CORS
cors.allowed-origins=https://localhost:5174,https://localhost:5173
spring.datasource.url=jdbc:postgresql://${DB_HOST:db}:${DB_PORT:5432}/${DB_NAME:smartground}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Liquibase deaktiviert bis v1.0 — JPA verwaltet das Schema
spring.liquibase.enabled=false


# JWT
jwt.secret=${JWT_SECRET:bWVpbi1zZWNyZXQta2V5LWZ1ZXItc21hcnQtZ3JvdW5kLWlzdC1sYW5n}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# MQTT configuration
mqtt.broker.url=${MQTT_BROKER_URL:tcp://mosquitto:1883}
mqtt.clientId=${MQTT_CLIENT_ID:smartrange-backend}
mqtt.health-check.offline-threshold-seconds=${MQTT_HEALTH_OFFLINE_THRESHOLD:30}

# API Docs
springdoc.packages-to-scan=ch.jp.shooting
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# Actuator
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=when_authorized

# Reservation
reservation.inactivity-timeout-minutes=${RESERVATION_INACTIVITY_TIMEOUT_MINUTES:10}

# OTA: base URL the SmartBox uses to pull artifacts, and where artifacts are stored
ota.base-url=${OTA_BASE_URL:http://localhost:8080}
ota.artifact-dir=${OTA_ARTIFACT_DIR:./ota-artifacts}