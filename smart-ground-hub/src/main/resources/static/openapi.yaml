          nullable: true
        strasse:
          type: string
          nullable: true
        hausnummer:
          type: string
          nullable: true
        plz:
          type: string
          nullable: true
        stadt:
          type: string
          nullable: true
        land:
          type: string
          nullable: true
        profilbildUrl:
          type: string
          nullable: true
        biographie:
          type: string
          nullable: true
        sprache:
          type: string
          nullable: true
          enum: [DE, EN, FR, IT]
        mitgliedsnummer:
          type: string
          nullable: true
        schiessLizenz:
          type: string
          nullable: true
        schiessLizenzVerfallsdatum:
          type: string
          format: date
          nullable: true
        status:
          type: string
          nullable: true
          enum: [ACTIVE, INACTIVE, SUSPENDED, PENDING_APPROVAL]

    ChangePasswordRequest:
      type: object
      required: [oldPassword, newPassword]
      properties:
        oldPassword:
          type: string
        newPassword:
          type: string

    UserResponse:
      type: object
      required: [id, email, username, vorname, nachname]
