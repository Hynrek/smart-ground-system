openapi: 3.0.3
info:
  title: SmartGround API
  version: 2.0.0
  description: >
    REST API for IoT device management with MQTT-based device discovery and
    command signaling. Includes endpoints to manage device types, register
    devices, and trigger config pushes to SmartBox firmware via MQTT.

    ## Device Management

    All device operations use the flat `/api/devices` endpoint. Devices are
    always registered on a SmartBox (network access point) but are managed
    as a flat list with optional filtering by SmartBox or Range.
    Use **POST /api/devices** to register and immediately trigger a config push
    to the SmartBox firmware via MQTT.

    ## Breaking changes from v2.x

    - `POST /api/smart-boxes/{id}/devices` removed — use `POST /api/devices`
    - `GET /api/smart-boxes/{id}/devices` removed — use `GET /api/devices?smartBoxId=X`
    - `POST/DELETE /api/ranges/{rangeId}/devices/{deviceId}` removed — use `POST/DELETE /api/devices/{id}/range`
    - `SmartBoxResponse.deviceCount` removed

servers:
  - url: http://localhost:8080
    description: JVM App
  - url: http://localhost:8081
    description: Native App

security:
  - bearerAuth: []

paths:

  # ─────────────────────────────────────────────────────────────────────────────
  # Auth
  # ─────────────────────────────────────────────────────────────────────────────
  /api/auth/login:
    post:
      summary: Authenticate and receive a JWT token
      operationId: login
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials

  /api/users:
    post:
      summary: Create a new user
      operationId: createUser
      tags: [User]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created successfully
        '409':
          description: User already exists

  # ─────────────────────────────────────────────────────────────────────────────
  # DeviceType
  # ─────────────────────────────────────────────────────────────────────────────
  /api/device-types:
    get:
      summary: List all device types
      operationId: listDeviceTypes
      tags: [DeviceType]
      parameters:
        - name: firmwareConfigId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter device types by firmware configuration
      responses:
        '200':
          description: A list of device types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeviceTypeResponse'

  /api/device-types/{id}:
    get:
      summary: Get a device type by ID
      operationId: getDeviceType
      tags: [DeviceType]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Device type found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceTypeResponse'
        '404':
          description: Device type not found

    patch:
      summary: Update a device type
      operationId: updateDeviceType
      tags: [DeviceType]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeviceTypeRequest'
      responses:
        '200':
          description: Device type updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceTypeResponse'
        '404':
          description: Device type not found

  # ─────────────────────────────────────────────────────────────────────────────
  # DeviceTypeGroup (consolidated under /device-types)
  # ─────────────────────────────────────────────────────────────────────────────
  /api/device-types/groups:
    get:
      summary: List all device type groups
      operationId: listDeviceTypeGroups
      tags: [DeviceType]
      responses:
        '200':
          description: A list of device type groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DeviceTypeGroupResponse'

  /api/device-types/groups/{id}:
    get:
      summary: Get a device type group by ID
      operationId: getDeviceTypeGroup
      tags: [DeviceType]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Device type group found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceTypeGroupResponse'
        '404':
          description: Device type group not found

  # ─────────────────────────────────────────────────────────────────────────────
  # FirmwareConfig (consolidated under /device-types)
  # ─────────────────────────────────────────────────────────────────────────────
  /api/device-types/firmware-configs:
    get:
      summary: List all firmware configurations
      operationId: listFirmwareConfigs
      tags: [DeviceType]
      responses:
        '200':
          description: A list of firmware configurations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FirmwareConfigResponse'

    post:
      summary: Register a new firmware configuration
      description: >
        Creates a new firmware configuration with associated signal types and device
        type groups. Requires ADMIN role. Each entry in signal_types both defines a
        signal type and creates (or reuses) a named device type group.
      operationId: registerFirmwareConfig
      tags: [DeviceType]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterFirmwareConfigRequest'
      responses:
        '201':
          description: Firmware configuration created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirmwareConfigResponse'
        '400':
          description: Invalid manifest or duplicate firmware version
        '403':
          description: User does not have ADMIN role

  /api/device-types/firmware-configs/{id}:
    get:
      summary: Get a firmware configuration by ID
      operationId: getFirmwareConfig
      tags: [DeviceType]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Firmware configuration found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirmwareConfigResponse'
        '404':
          description: Firmware configuration not found

  # ─────────────────────────────────────────────────────────────────────────────
  # Device
  # ─────────────────────────────────────────────────────────────────────────────
  /api/devices:
    get:
      summary: List all devices
      operationId: listDevices
      tags: [Device]
      parameters:
        - name: rangeId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter devices by range
        - name: smartBoxId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter devices by smart box
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Zero-based page number
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Number of items per page
      responses:
        '200':
          description: A list of devices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DevicePageResponse'

    post:
      summary: Register a device on a smart box
      operationId: createDevice
      tags: [Device]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDeviceRequest'
      responses:
        '201':
          description: Device registered and config push triggered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
        '404':
          description: Smart box or device type not found

  /api/devices/{id}:
    get:
      summary: Get device by ID
      operationId: getDevice
      tags: [Device]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Device found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
        '404':
          description: Device not found

    patch:
      summary: Update device properties
      operationId: updateDevice
      tags: [Device]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDeviceRequest'
      responses:
        '200':
          description: Device updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
        '404':
          description: Device not found

    delete:
      summary: Delete a device
      operationId: deleteDevice
      tags: [Device]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Device deleted
        '404':
          description: Device not found

  /api/devices/{id}/command:
    post:
      summary: Send a command to a device (routed via MQTT to the SmartBox)
      operationId: sendDeviceCommand
      tags: [Device]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Command accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'
        '400':
          description: Device is blocked
        '404':
          description: Device not found

  /api/devices/{id}/range:
    post:
      summary: Assign device to a range
      operationId: assignDeviceToRange
      tags: [Device]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRangeRequest'
      responses:
        '200':
          description: Device assigned to range
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceResponse'
        '404':
          description: Device or range not found

    delete:
      summary: Unassign device from its range
      operationId: removeDeviceFromRange
      tags: [Device]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Device unassigned
        '404':
          description: Device not found

  # ─────────────────────────────────────────────────────────────────────────────
  # Range
  # ─────────────────────────────────────────────────────────────────────────────
  /api/ranges:
    get:
      summary: List all ranges
      operationId: listRanges
      tags: [Range]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Zero-based page number
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Number of items per page
      responses:
        '200':
          description: A list of ranges
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RangePageResponse'

    post:
      summary: Create a new range
      operationId: createRange
      tags: [Range]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRangeRequest'
      responses:
        '201':
          description: Range created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RangeSummaryResponse'
        '400':
          description: Bad request

  /api/ranges/{id}:
    get:
      summary: Get range by ID
      operationId: getRange
      tags: [Range]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Range found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RangeDetailResponse'
        '404':
          description: Range not found

    put:
      summary: Update a range
      operationId: updateRange
      tags: [Range]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRangeRequest'
      responses:
        '200':
          description: Range updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RangeSummaryResponse'
        '404':
          description: Range not found

    delete:
      summary: Delete a range
      operationId: deleteRange
      tags: [Range]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Range deleted
        '404':
          description: Range not found

  /api/ranges/{id}/locked:
    patch:
      summary: Lock or unlock a range
      description: >
        When a range is locked, device assignment (POST/DELETE /api/ranges/{id}/devices/{deviceId})
        is rejected with 409. Commands to devices within the range are still forwarded.
        Locking is a safety mechanism to prevent accidental reconfiguration during an active session.
      operationId: setRangeLocked
      tags: [Range]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetLockedRequest'
      responses:
        '200':
          description: Range lock state updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RangeSummaryResponse'
        '404':
          description: Range not found

  # ─────────────────────────────────────────────────────────────────────────────
  # Events (SSE)
  # ─────────────────────────────────────────────────────────────────────────────
  /api/events:
    get:
      summary: Server-Sent Events stream for real-time state changes
      description: >
        Opens a persistent SSE connection. The server pushes events whenever
        SmartBox or Device state changes (driven by MQTT). Clients should
        reconnect automatically on disconnect using the EventSource API.

        Event types:
        - `smartbox.status`   — SmartBox status changed (ONLINE/OFFLINE/BLOCKED)
        - `smartbox.synced`   — SmartBox configSynced flag changed
        - `device.health`     — Device healthy or blocked flag changed

        Each event's `data` field is a JSON object. See schemas below.
      operationId: streamEvents
      tags: [Events]
      responses:
        '200':
          description: SSE stream established
          content:
            text/event-stream:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/SmartBoxStatusEvent'
                  - $ref: '#/components/schemas/SmartBoxSyncedEvent'
                  - $ref: '#/components/schemas/DeviceHealthEvent'

  # ─────────────────────────────────────────────────────────────────────────────
  # Sessions (Competition Management)
  # ─────────────────────────────────────────────────────────────────────────────
  /api/sessions:
    get:
      summary: List all sessions
      operationId: listSessions
      tags: [Session]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Zero-based page number
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Number of items per page
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionPageResponse'

    post:
      summary: Create a new session
      operationId: createSession
      tags: [Session]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          description: Invalid request

  /api/sessions/{sessionId}:
    get:
      summary: Get session details
      operationId: getSession
      tags: [Session]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '404':
          description: Session not found

  /api/sessions/{sessionId}/groups:
    get:
      summary: List groups in a session
      operationId: listGroups
      tags: [Session]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupResponse'

    post:
      summary: Create a group in a session
      operationId: createGroup
      tags: [Session]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCreateRequest'
      responses:
        '201':
          description: Group created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'

  /api/sessions/{sessionId}/bracket:
    post:
      summary: Initialize bracket tournament
      operationId: initializeBracket
      tags: [Session]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitializeBracketRequest'
      responses:
        '200':
          description: Bracket initialized
        '404':
          description: Session not found

  /api/sessions/{sessionId}/leaderboard:
    get:
      summary: Get session leaderboard
      operationId: getLeaderboard
      tags: [Session]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Leaderboard data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionLeaderboardResponse'
        '404':
          description: Session not found

  /api/sessions/{sessionId}/results:
    get:
      summary: Get competition results
      operationId: getCompetitionResults
      tags: [Session]
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Competition results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlayerResultResponse'

  # ─────────────────────────────────────────────────────────────────────────────
  # SmartBox
  # ─────────────────────────────────────────────────────────────────────────────
  /api/smart-boxes:
    get:
      summary: List all smart boxes
      operationId: listSmartBoxes
      tags: [SmartBox]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Zero-based page number
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Number of items per page
      responses:
        '200':
          description: A list of smart boxes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmartBoxPageResponse'

  /api/smart-boxes/{id}:
    get:
      summary: Get smart box by ID
      operationId: getSmartBox
      tags: [SmartBox]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Smart box found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmartBoxResponse'
        '404':
          description: Smart box not found

  /api/smart-boxes/{id}/alias:
    patch:
      summary: Set alias for a smart box
      operationId: setSmartBoxAlias
      tags: [SmartBox]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetAliasRequest'
      responses:
        '200':
          description: Alias set
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SmartBoxResponse'
        '404':
          description: Smart box not found

  /api/smart-boxes/{id}/push-config:
    post:
      summary: Manually trigger a config push to a smart box
      description: >
        Forces the backend to re-publish the full device configuration to the
        SmartBox via MQTT (topic: smartboxes/{mac}/config). Useful after
        changes to device types or when a box reconnects without triggering
        auto-push via discovery.
      operationId: pushSmartBoxConfig
      tags: [SmartBox]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '202':
          description: Config push accepted (MQTT publish dispatched)
        '404':
          description: Smart box not found

  # ─────────────────────────────────────────────────────────────────────────────
  # Guests
  # ─────────────────────────────────────────────────────────────────────────────
  /api/guests:
    get:
      summary: List all guests
      operationId: listGuests
      tags: [Guest]
      responses:
        '200':
          description: List of guests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GuestResponse'
    post:
      summary: Create a new guest
      operationId: createGuest
      tags: [Guest]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGuestRequest'
      responses:
        '201':
          description: Guest created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuestResponse'

  /api/guests/{id}:
    put:
      summary: Update a guest's display name
      operationId: updateGuest
      tags: [Guest]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGuestRequest'
      responses:
        '200':
          description: Guest updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuestResponse'
        '404':
          description: Guest not found
    delete:
      summary: Delete a guest
      operationId: deleteGuest
      tags: [Guest]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Guest deleted
        '404':
          description: Guest not found

  # ─────────────────────────────────────────────────────────────────────────────
  # Abläufe (Sequences)
  # ─────────────────────────────────────────────────────────────────────────────
  /api/ablaeufe:
    get:
      summary: List Abläufe visible to the current user
      description: >
        Returns the calling user's own Abläufe (ownership=user) plus all
        range-published Abläufe (ownership=range). Admins and Ground Owners see
        all Abläufe. Results can be narrowed with query parameters.
      operationId: listAblaeufe
      tags: [Programme]
      parameters:
        - name: ownership
          in: query
          required: false
          schema:
            type: string
            enum: [user, range]
          description: Filter by ownership type
        - name: rangeId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter by range assignment
      responses:
        '200':
          description: List of Abläufe
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AblaufResponse'
    post:
      summary: Create a new Ablauf
      operationId: createAblauf
      tags: [Programme]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAblaufRequest'
      responses:
        '201':
          description: Ablauf created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AblaufResponse'
        '400':
          description: Validation error (e.g. empty steps array)

  /api/ablaeufe/{id}:
    get:
      summary: Get an Ablauf by ID
      operationId: getAblauf
      tags: [Programme]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Ablauf detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AblaufResponse'
        '403':
          description: Ablauf belongs to another user
        '404':
          description: Ablauf not found
    put:
      summary: Rename or reassign an Ablauf
      operationId: updateAblauf
      tags: [Programme]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAblaufRequest'
      responses:
        '200':
          description: Ablauf updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AblaufResponse'
        '403':
          description: Not the owner of this Ablauf
        '404':
          description: Ablauf not found
    delete:
      summary: Delete an Ablauf
      operationId: deleteAblauf
      tags: [Programme]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Ablauf deleted
        '403':
          description: Not the owner of this Ablauf
        '404':
          description: Ablauf not found

  /api/ablaeufe/{id}/ownership:
    patch:
      summary: Publish Ablauf to the range or make it private again
      description: >
        Changing ownership to 'range' makes the Ablauf visible to all users.
        Only ADMIN and GROUND_OWNER roles may publish to the range.
        Reverting to 'user' removes it from the global list.
      operationId: updateAblaufOwnership
      tags: [Programme]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAblaufOwnershipRequest'
      responses:
        '200':
          description: Ownership updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AblaufResponse'
        '403':
          description: Insufficient role to publish to range
        '404':
          description: Ablauf not found

  # ─────────────────────────────────────────────────────────────────────────────
  # Programme
  # ─────────────────────────────────────────────────────────────────────────────
  /api/programmes:
    get:
      summary: List Programmes owned by the current user
      operationId: listProgrammes
      tags: [Programme]
      responses:
        '200':
          description: List of Programmes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProgrammeResponse'
    post:
      summary: Create a new Programme from a list of Abläufe
      description: >
        The selected Abläufe are snapshotted into the Programme at creation time.
        Later edits to the source Abläufe do not affect this Programme.
        Provide ablaufIds in the desired playback order.
      operationId: createProgramme
      tags: [Programme]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProgrammeRequest'
      responses:
        '201':
          description: Programme created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgrammeResponse'
        '400':
          description: Validation error
        '404':
          description: One or more Ablauf IDs not found

  /api/programmes/{id}:
    get:
      summary: Get a Programme by ID
      operationId: getProgramme
      tags: [Programme]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Programme detail (includes full embedded Abläufe with steps)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgrammeResponse'
        '403':
          description: Programme belongs to another user
        '404':
          description: Programme not found
    put:
      summary: Rename a Programme
      operationId: updateProgramme
      tags: [Programme]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProgrammeRequest'
      responses:
        '200':
          description: Programme updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProgrammeResponse'
        '403':
          description: Not the owner
        '404':
          description: Programme not found
    delete:
      summary: Delete a Programme
      operationId: deleteProgramme
      tags: [Programme]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Programme deleted
        '403':
          description: Not the owner
        '404':
          description: Programme not found

  # ─────────────────────────────────────────────────────────────────────────────
  # Trainings
  # ─────────────────────────────────────────────────────────────────────────────
  /api/trainings:
    get:
      summary: List Trainings owned by the current user
      operationId: listTrainings
      tags: [Training]
      responses:
        '200':
          description: List of Trainings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TrainingResponse'
    post:
      summary: Create a new Training from a list of Programmes
      description: >
        Programmes are snapshotted (with all their embedded Abläufe and steps)
        at creation time. Provide programmeIds in the desired execution order.
      operationId: createTraining
      tags: [Training]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTrainingRequest'
      responses:
        '201':
          description: Training created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingResponse'
        '400':
          description: Validation error
        '404':
          description: One or more Programme IDs not found

  /api/trainings/{id}:
    get:
      summary: Get a Training by ID
      operationId: getTraining
      tags: [Training]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Training detail (full nested snapshot)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingResponse'
        '403':
          description: Training belongs to another user
        '404':
          description: Training not found
    put:
      summary: Rename a Training
      operationId: updateTraining
      tags: [Training]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTrainingRequest'
      responses:
        '200':
          description: Training updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrainingResponse'
        '403':
          description: Not the owner
        '404':
          description: Training not found
    delete:
      summary: Delete a Training
      operationId: deleteTraining
      tags: [Training]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Training deleted
        '403':
          description: Not the owner
        '404':
          description: Training not found

  # ─────────────────────────────────────────────────────────────────────────────
  # Play Instances (live execution of a Programme or Training)
  # ─────────────────────────────────────────────────────────────────────────────
  /api/play-instances/programme:
    post:
      summary: Start a Programme play instance
      description: >
        Launches a new active run of a Programme for one or more players.
        The backend creates a block for every Ablauf in the Programme and
        sets all blocks to 'pending'. Players can be registered users or guests.
      operationId: startProgrammeInstance
      tags: [PlayInstance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartProgrammeInstanceRequest'
      responses:
        '201':
          description: Play instance created and active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayInstanceResponse'
        '404':
          description: Programme not found

  /api/play-instances/training:
    post:
      summary: Start a Training play instance
      description: >
        Launches a new active run of a Training. The backend maps each
        Programme in the Training to a phase, and each Ablauf to a block within
        that phase. Only the first phase starts as 'active'; subsequent phases
        unlock automatically when the previous phase completes.
      operationId: startTrainingInstance
      tags: [PlayInstance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartTrainingInstanceRequest'
      responses:
        '201':
          description: Play instance created and active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayInstanceResponse'
        '404':
          description: Training not found

  /api/play-instances:
    get:
      summary: List play instances
      description: >
        Returns active instances by default. Use the 'status' filter for
        completed or cancelled instances. The 'rangeId' filter returns only
        instances that have at least one pending or in-progress block on that
        range — useful for the range-specific live view.
      operationId: listPlayInstances
      tags: [PlayInstance]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, completed, cancelled]
          description: "Filter by instance status (default: active)"
        - name: rangeId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter instances that have blocks on this range
      responses:
        '200':
          description: List of play instances
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PlayInstanceResponse'

  /api/play-instances/{instanceId}:
    get:
      summary: Get a single play instance
      operationId: getPlayInstance
      tags: [PlayInstance]
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Play instance detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayInstanceResponse'
        '404':
          description: Instance not found
    delete:
      summary: Stop/cancel a play instance
      operationId: stopPlayInstance
      tags: [PlayInstance]
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Instance cancelled
        '404':
          description: Instance not found

  /api/play-instances/{instanceId}/blocks/{blockId}/start:
    post:
      summary: Mark a block as in-progress
      description: >
        Called when the range starts executing this Ablauf block. Transitions
        the block from 'pending' to 'in_progress'. Idempotent if already
        in_progress.
      operationId: startBlock
      tags: [PlayInstance]
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: blockId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Block marked as in_progress; updated instance returned
          content:
            application/json:
                $ref: '#/components/schemas/PlayInstanceResponse'
        '404':
          description: Instance or block not found
        '409':
          description: Block is already done

  /api/play-instances/{instanceId}/blocks/{blockId}/complete:
    post:
      summary: Mark a block as done and persist player results
      description: >
        Stores the per-player score and step-state data for this block.
        If all blocks in the current phase are done, the backend advances the
        Training to the next phase (or marks the whole instance as completed).
        For a Programme instance, completing all blocks closes the instance.
      operationId: completeBlock
      tags: [PlayInstance]
      parameters:
        - name: instanceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: blockId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteBlockRequest'
      responses:
        '200':
          description: Block completed; updated instance returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayInstanceResponse'
        '404':
          description: Instance or block not found
        '409':
          description: Block is not in in_progress state

  # ─────────────────────────────────────────────────────────────────────────────
  # Play Results (history of completed play instances)
  # ─────────────────────────────────────────────────────────────────────────────
  /api/play-results:
    get:
      summary: List completed play results (paginated)
      description: >
        Historical record of all completed Programme and Training runs.
        Ordered by completedAt descending.
      operationId: listPlayResults
      tags: [PlayResult]
      parameters:
        - name: rangeId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter results that involved blocks on this range
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Earliest completedAt (ISO 8601)
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Latest completedAt (ISO 8601)
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of play results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayResultPage'

  /api/play-results/{resultId}:
    get:
      summary: Get a single play result with full detail
      operationId: getPlayResult
      tags: [PlayResult]
      parameters:
        - name: resultId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Play result with all block results and step states
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlayResultResponse'
        '404':
          description: Result not found

components:
  schemas:

    # ───── Guest ──────────────────────────────────────────────────────────────

    GuestResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateGuestRequest:
      type: object
      required: [displayName]
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 100

    UpdateGuestRequest:
      type: object
      required: [displayName]
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 100

    # ───── Step primitives ────────────────────────────────────────────────────

    StepType:
      type: string
      enum: [solo, pair, a_schuss, raffale]
      description: >
        solo     — one device fires once.
        pair     — two devices fire simultaneously.
        a_schuss — two devices fire in sequence (tap A then tap B).
        raffale  — same device fires twice (start tap then end tap).

    StepState:
      type: string
      enum: [pending, done, failed-a, failed-b, failed-both]
      description: >
        Result of a single step for one player.
        failed-a / failed-b apply to pair/a_schuss where only one bird was missed.
        failed-both means both missed (or solo failed).

    Step:
      type: object
      required: [id, type]
      description: >
        A single throw event within an Ablauf.
        Fields populated depend on step type.
      properties:
        id:
          type: string
          description: >
            Client-generated identifier (UUID or timestamp string).
            Used for ordering and stable referencing in results.
        type:
          $ref: '#/components/schemas/StepType'
        deviceId:
          type: string
          format: uuid
          nullable: true
          description: Device to fire (solo and raffale steps)
        alias:
          type: string
          nullable: true
          description: Human-readable label for the device at capture time
        letter:
          type: string
          nullable: true
          description: Single-letter shorthand shown in the UI (e.g. A)
        deviceId1:
          type: string
          format: uuid
          nullable: true
        deviceId2:
          type: string
          format: uuid
          nullable: true
        alias1:
          type: string
          nullable: true
        alias2:
          type: string
          nullable: true
        letter1:
          type: string
          nullable: true
        letter2:
          type: string
          nullable: true

    # ───── Ablauf ─────────────────────────────────────────────────────────────

    AblaufOwnership:
      type: string
      enum: [user, range]
      description: >
        user  — private to the owner.
        range — published for all users at this shooting range.

    AblaufResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        ownership:
          $ref: '#/components/schemas/AblaufOwnership'
        rangeId:
          type: string
          format: uuid
          nullable: true
          description: Range this Ablauf is designed for (used for block routing)
        rangeName:
          type: string
          nullable: true
        steps:
          type: array
          items:
            $ref: '#/components/schemas/Step'
        createdAt:
          type: string
          format: date-time
        ownerUsername:
          type: string
          description: Username of the user who created this Ablauf

    CreateAblaufRequest:
      type: object
      required: [name, steps]
      properties:
        name:
          type: string
          minLength: 1
        rangeId:
          type: string
          format: uuid
          nullable: true
          description: Optional range assignment
        steps:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Step'
        ownership:
          $ref: '#/components/schemas/AblaufOwnership'

    UpdateAblaufRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
        rangeId:
          type: string
          format: uuid
          nullable: true

    UpdateAblaufOwnershipRequest:
      type: object
      required: [ownership]
      properties:
        ownership:
          $ref: '#/components/schemas/AblaufOwnership'

    # ───── Programme ──────────────────────────────────────────────────────────

    EmbeddedAblauf:
      type: object
      description: >
        Snapshot of an Ablauf stored inside a Programme or Training.
        The source Ablauf may change independently; this snapshot is immutable.
      properties:
        id:
          type: string
          format: uuid
          description: References the source Ablauf (for UI cross-linking only)
        alias:
          type: string
          description: Name at snapshot time
        rangeId:
          type: string
          format: uuid
          nullable: true
        rangeName:
          type: string
          nullable: true
        steps:
          type: array
          items:
            $ref: '#/components/schemas/Step'

    ProgrammeResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        ablaeufe:
          type: array
          items:
            $ref: '#/components/schemas/EmbeddedAblauf'
        createdAt:
          type: string
          format: date-time
        ownerUsername:
          type: string

    CreateProgrammeRequest:
      type: object
      required: [name, ablaufIds]
      properties:
        name:
          type: string
          minLength: 1
        ablaufIds:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
          description: >
            Ordered list of Ablauf IDs. Steps are snapshotted at creation
            time so later edits to source Abläufe do not affect this Programme.

    UpdateProgrammeRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    # ───── Training ───────────────────────────────────────────────────────────

    TrainingProgramme:
      type: object
      description: Snapshot of one Programme phase within a Training.
      properties:
        id:
          type: string
          format: uuid
          description: References the source Programme
        name:
          type: string
          description: Name at snapshot time
        ablaeufe:
          type: array
          items:
            $ref: '#/components/schemas/EmbeddedAblauf'

    TrainingResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        programmes:
          type: array
          items:
            $ref: '#/components/schemas/TrainingProgramme'
        createdAt:
          type: string
          format: date-time
        ownerUsername:
          type: string

    CreateTrainingRequest:
      type: object
      required: [name, programmeIds]
      properties:
        name:
          type: string
          minLength: 1
        programmeIds:
          type: array
          minItems: 1
          items:
            type: string
            format: uuid
          description: >
            Ordered list of Programme IDs. Each becomes one phase in the
            Training. Steps are snapshotted at creation time.

    UpdateTrainingRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1

    # ───── Play Instances ─────────────────────────────────────────────────────

    PlayerRef:
      type: object
      required: [id, type, displayName]
      description: Reference to a participant in a play instance.
      properties:
        id:
          type: string
          description: >
            UUID of the user (type=user) or guest record (type=guest).
            For an anonymous one-off player a client-generated UUID is accepted.
        type:
          type: string
          enum: [user, guest]
        displayName:
          type: string

    BlockStatus:
      type: string
      enum: [pending, in_progress, done]

    StepStateRecord:
      type: object
      description: Result of one step for one player within a completed block.
      properties:
        playerId:
          type: string
        ablaufIndex:
          type: integer
          description: Index of the Ablauf (segment) within the Programme
        stepIndex:
          type: integer
          description: Index of the step within the Ablauf
        state:
          $ref: '#/components/schemas/StepState'
        pointValue:
          type: integer
          description: Maximum points for this step (1 for solo/raffale, 2 for pair/a_schuss)
        noBirds:
          type: integer
          description: How many times this step was retried due to a no-bird
          default: 0
        pointsEarned:
          type: integer
          description: Actual points earned after any deductions

    PlayerResult:
      type: object
      description: Aggregated score and step detail for one player in one block.
      properties:
        playerId:
          type: string
        displayName:
          type: string
        totalPoints:
          type: integer
        maxPoints:
          type: integer
        stepStates:
          type: array
          items:
            $ref: '#/components/schemas/StepStateRecord'

    BlockResult:
      type: object
      properties:
        playerResults:
          type: array
          items:
            $ref: '#/components/schemas/PlayerResult'

    PlayBlock:
      type: object
      description: One Ablauf execution slot within a play instance.
      properties:
        blockId:
          type: string
          format: uuid
        ablaufId:
          type: string
          format: uuid
          description: Source Ablauf ID (for cross-linking to the template)
        ablaufAlias:
          type: string
          description: Name of the Ablauf at the time the instance was created
        rangeId:
          type: string
          format: uuid
          nullable: true
          description: Range this block is assigned to (used for live range view routing)
        rangeName:
          type: string
          nullable: true
        steps:
          type: array
          items:
            $ref: '#/components/schemas/Step'
        status:
          $ref: '#/components/schemas/BlockStatus'
        completedAt:
          type: string
          format: date-time
          nullable: true
        result:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/BlockResult'

    PlayPhase:
      type: object
      description: >
        One Programme execution slot within a Training play instance.
        Phases run sequentially — the next phase becomes active only after
        all blocks in the current phase are done.
      properties:
        phaseIndex:
          type: integer
        programmeId:
          type: string
          format: uuid
        programmeName:
          type: string
        status:
          type: string
          enum: [pending, active, done]
        blocks:
          type: array
          items:
            $ref: '#/components/schemas/PlayBlock'

    PlayInstanceStatus:
      type: string
      enum: [active, completed, cancelled]

    PlayInstanceResponse:
      type: object
      properties:
        instanceId:
          type: string
          format: uuid
        type:
          type: string
          enum: [programm, training]
        templateId:
          type: string
          format: uuid
          description: ID of the Programme or Training template used
        templateName:
          type: string
        status:
          $ref: '#/components/schemas/PlayInstanceStatus'
        players:
          type: array
          items:
            $ref: '#/components/schemas/PlayerRef'
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        blocks:
          type: array
          nullable: true
          description: Populated for type=programm
          items:
            $ref: '#/components/schemas/PlayBlock'
        phases:
          type: array
          nullable: true
          description: Populated for type=training
          items:
            $ref: '#/components/schemas/PlayPhase'
        currentPhaseIndex:
          type: integer
          nullable: true
          description: Index of the currently active phase (training instances only)

    StartProgrammeInstanceRequest:
      type: object
      required: [programmeId, players]
      properties:
        programmeId:
          type: string
          format: uuid
        players:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/PlayerRef'

    StartTrainingInstanceRequest:
      type: object
      required: [trainingId, players]
      properties:
        trainingId:
          type: string
          format: uuid
        players:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/PlayerRef'

    CompleteBlockRequest:
      type: object
      required: [playerResults]
      properties:
        playerResults:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/PlayerResult'

    # ───── Play Results (history) ─────────────────────────────────────────────

    PlayResultSummary:
      type: object
      description: Lightweight summary card shown in the results list.
      properties:
        resultId:
          type: string
          format: uuid
        type:
          type: string
          enum: [programm, training]
        templateId:
          type: string
          format: uuid
        templateName:
          type: string
        players:
          type: array
          items:
            $ref: '#/components/schemas/PlayerRef'
        completedAt:
          type: string
          format: date-time
        topScore:
          type: integer
          description: Highest total points earned by any single player in this run

    PlayResultPage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/PlayResultSummary'
        meta:
          $ref: '#/components/schemas/PageMeta'

    PlayResultResponse:
      type: object
      description: Full detail for one completed play run, including all block results.
      properties:
        resultId:
          type: string
          format: uuid
        type:
          type: string
          enum: [programm, training]
        templateId:
          type: string
          format: uuid
        templateName:
          type: string
        players:
          type: array
          items:
            $ref: '#/components/schemas/PlayerRef'
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        blocks:
          type: array
          nullable: true
          description: Populated for programm results
          items:
            $ref: '#/components/schemas/PlayBlock'
        phases:
          type: array
          nullable: true
          description: Populated for training results
          items:
            $ref: '#/components/schemas/PlayPhase'

    # ───── SmartBox Status Enum ────────────────────────────────────────────────

    SmartBoxStatus:
      type: string
      enum: [ONLINE, OFFLINE, BLOCKED]
      description: SmartBox operational status

    # ───── Pin Configuration ───────────────────────────────────────────────────

    PinConfig:
      type: object
      required: [pin, mode]
      properties:
        pin:
          type: integer
          minimum: 0
          maximum: 40
          description: GPIO pin number on the Raspberry Pi Pico 2W (valid range 0-29 for user GPIOs)
        mode:
          type: string
          enum: [OUTPUT, INPUT, INPUT_PULLUP, INPUT_PULLDOWN, PWM]
          description: GPIO mode as understood by the firmware
        pwmFrequencyHz:
          type: integer
          minimum: 1
          description: Required when mode is PWM. Sets the PWM carrier frequency.
        invertLogic:
          type: boolean
          default: false
          description: When true, the firmware inverts the signal (active-low wiring)

    # ───── Pagination ──────────────────────────────────────────────────────────

    PageMeta:
      type: object
      properties:
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer

    # ───── DeviceType ─────────────────────────────────────────────────────────

    DeviceTypeResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        signalTypeId:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        groupName:
          type: string
        signalDurationMs:
          type: integer
        delaySignalDurationMs:
          type: integer
          nullable: true
        command:
          type: string
        device:
          type: string
        direction:
          type: string

    DeviceTypeGroupResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    FirmwareConfigResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        version:
          type: string
        boxType:
          type: string
        signalTypes:
          type: array
          items:
            $ref: '#/components/schemas/FirmwareConfigSignalTypeResponse'

    FirmwareConfigSignalTypeResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        communicationDirection:
          type: string
        device:
          type: string
        command:
          type: string

    RegisterFirmwareConfigRequest:
      type: object
      required: [version, box_type, signal_types]
      properties:
        version:
          type: string
        box_type:
          type: string
        signal_types:
          type: array
          items:
            $ref: '#/components/schemas/RegisterFirmwareConfigSignalTypeEntry'

    RegisterFirmwareConfigSignalTypeEntry:
      type: object
      required: [direction, device, command, group_name, name, signal_duration_ms]
      properties:
        direction:
          type: string
        device:
          type: string
        command:
          type: string
        group_name:
          type: string
        name:
          type: string
        signal_duration_ms:
          type: integer
          minimum: 0
        delay_signal_duration_ms:
          type: integer
          nullable: true

    UpdateDeviceTypeRequest:
      type: object
      properties:
        name:
          type: string
        signalDurationMs:
          type: integer
          nullable: true
        delaySignalDurationMs:
          type: integer
          nullable: true

    # ───── Device ─────────────────────────────────────────────────────────────

    DeviceResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        alias:
          type: string
        smartBoxId:
          type: string
          format: uuid
        groupId:
          type: string
          format: uuid
        groupName:
          type: string
        deviceTypeId:
          type: string
          format: uuid
        deviceType:
          type: string
        command:
          type: string
        boxType:
          type: string
        blocked:
          type: boolean
        healthy:
          type: boolean
        signalDurationMs:
          type: integer
        delaySignalDurationMs:
          type: integer
          nullable: true
        pinConfig:
          $ref: '#/components/schemas/PinConfig'
        rangeId:
          type: string
          format: uuid
          nullable: true

    CommandResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
        detail:
          type: string

    # ───── Range ──────────────────────────────────────────────────────────────

    RangeSummaryResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        locked:
          type: boolean
        deviceCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    RangeDetailResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        locked:
          type: boolean
        devices:
          type: array
          items:
            $ref: '#/components/schemas/DeviceResponse'
        createdAt:
          type: string
          format: date-time

    CreateRangeRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    UpdateRangeRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    SetLockedRequest:
      type: object
      required: [locked]
      properties:
        locked:
          type: boolean

    # ─────────────────────────────────────────────────────────────────────────

    DevicePageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/DeviceResponse'
        meta:
          $ref: '#/components/schemas/PageMeta'

    RangePageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/RangeSummaryResponse'
        meta:
          $ref: '#/components/schemas/PageMeta'

    SmartBoxPageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/SmartBoxResponse'
        meta:
          $ref: '#/components/schemas/PageMeta'

    # ───── SmartBox ───────────────────────────────────────────────────────────

    SmartBoxResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        macAddress:
          type: string
        alias:
          type: string
        status:
          $ref: '#/components/schemas/SmartBoxStatus'
        firmwareVersion:
          type: string
        configSynced:
          type: boolean
          description: >
            true once the SmartBox has ACK'd the latest config push via
            smartboxes/{mac}/config/ack

    CreateDeviceRequest:
      type: object
      required: [smartBoxId, groupId, deviceTypeId, alias]
      properties:
        smartBoxId:
          type: string
          format: uuid
          description: The SmartBox this device will be registered on
        groupId:
          type: string
          format: uuid
          description: The DeviceTypeGroup for this device
        deviceTypeId:
          type: string
          format: uuid
          description: The specific DeviceType within the group
        alias:
          type: string
          description: User-friendly name for this device
        rangeId:
          type: string
          format: uuid
          nullable: true
          description: Optional range to assign the device to on registration
        delaySignalDurationMs:
          type: integer
          nullable: true
          description: Override delay before the signal fires (ms)

    UpdateDeviceRequest:
      type: object
      properties:
        alias:
          type: string
        signalDurationMs:
          type: integer
          nullable: true
          description: How long the signal is held active (null = use device type default)
        delaySignalDurationMs:
          type: integer
          nullable: true
          description: Delay before signal fires (null = use device type default)
        groupId:
          type: string
          format: uuid
          description: Reassign device to a different device type group

    AssignRangeRequest:
      type: object
      required: [rangeId]
      properties:
        rangeId:
          type: string
          format: uuid
          description: ID of the range to assign this device to

    SetAliasRequest:
      type: object
      required: [alias]
      properties:
        alias:
          type: string

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    LoginResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string
          description: JWT token containing username and role as claims

    CreateUserRequest:
      type: object
      required: [username, password, role]
      properties:
        username:
          type: string
          description: Username for the new user
        password:
          type: string
          description: Password for the new user
        role:
          type: string
          description: User role (ADMIN or SHOOTER)

    # ───── Session/Competition ──────────────────────────────────────────────────

    SessionResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [SETUP, ACTIVE, COMPLETED, CANCELLED]
          description: Current session status
        sessionType:
          type: string
          enum: [LEAGUE, BRACKET, KNOCKOUT]
          description: Session competition type
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true

    CreateSessionRequest:
      type: object
      required: [name, sessionType]
      properties:
        name:
          type: string
          description: Session name
        description:
          type: string
          nullable: true
        sessionType:
          type: string
          enum: [LEAGUE, BRACKET, KNOCKOUT]
          description: Competition format

    SessionPageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/SessionResponse'
        meta:
          $ref: '#/components/schemas/PageMeta'

    GroupResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        sessionId:
          type: string
          format: uuid
        members:
          type: array
          items:
            $ref: '#/components/schemas/SessionPlayerResponse'
        createdAt:
          type: string
          format: date-time

    GroupCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Group name (e.g. Gruppe 1, Group A)
        members:
          type: array
          description: Optional list of players to add to the group
          items:
            $ref: '#/components/schemas/SessionPlayerCreateRequest'

    SessionPlayerResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [USER, GUEST]
        displayName:
          type: string
        userId:
          type: string
          format: uuid
          nullable: true

    SessionPlayerCreateRequest:
      type: object
      required: [type, displayName]
      properties:
        type:
          type: string
          enum: [USER, GUEST]
        displayName:
          type: string
        userId:
          type: string
          format: uuid
          nullable: true

    InitializeBracketRequest:
      type: object
      required: [bracketType, seedingStrategy]
      properties:
        bracketType:
          type: string
          enum: [SINGLE_ELIMINATION, DOUBLE_ELIMINATION]
          description: Bracket tournament type
        seedingStrategy:
          type: string
          enum: [BY_REGISTRATION_ORDER, BY_SCORE_RANKING, BY_TIEBREAKER]
          description: How to seed players
        tiebreakers:
          type: array
          nullable: true
          items:
            type: string
            enum: [TOTAL_SCORE, WIN_RATIO, HEADTOHEAD]

    SessionLeaderboardResponse:
      type: object
      properties:
        sessionId:
          type: string
          format: uuid
        standings:
          type: array
          items:
            $ref: '#/components/schemas/LeaderboardEntry'

    LeaderboardEntry:
      type: object
      properties:
        rank:
          type: integer
        playerId:
          type: string
          format: uuid
        displayName:
          type: string
        totalScore:
          type: integer
        maxScore:
          type: integer
        accuracy:
          type: number
          format: float
          description: Percentage of successful shots

    PlayerResultResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        playerId:
          type: string
          format: uuid
        sessionId:
          type: string
          format: uuid
        programResults:
          type: string
          description: JSON array of program results
        createdAt:
          type: string
          format: date-time

    # ───── SSE Events ─────────────────────────────────────────────────────────

    SmartBoxStatusEvent:
      type: object
      description: Emitted when a SmartBox changes status (ONLINE/OFFLINE/BLOCKED)
      required: [type, smartBoxId]
      properties:
        type:
          type: string
          enum: [smartbox.status]
        smartBoxId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/SmartBoxStatus'

    SmartBoxSyncedEvent:
      type: object
      description: Emitted when a SmartBox ACKs a config push
      required: [type, smartBoxId]
      properties:
        type:
          type: string
          enum: [smartbox.synced]
        smartBoxId:
          type: string
          format: uuid

    DeviceHealthEvent:
      type: object
      description: Emitted when a device healthy or blocked flag changes
      required: [type, deviceId]
      properties:
        type:
          type: string
          enum: [device.health]
        deviceId:
          type: string
          format: uuid
        healthy:
          type: boolean
        blocked:
          type: boolean

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
