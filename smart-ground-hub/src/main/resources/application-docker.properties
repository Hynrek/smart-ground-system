server.port=8080

# nginx (smart-ground-ui image) terminates TLS and forwards X-Forwarded-Proto/Host;
# without this Spring doesn't know the original request was https, and any
# scheme-aware behavior (Swagger server URL, secure redirects) would report http.
server.forward-headers-strategy=framework

spring.datasource.url=jdbc:postgresql://db:5432/smartground
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.liquibase.enabled=false

mqtt.broker.url=tcp://mosquitto:1883
mqtt.clientId=smartground-docker
