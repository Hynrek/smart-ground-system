# H2 In-Memory database for local development
spring.datasource.url=jdbc:h2:mem:smartground;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

spring.liquibase.enabled=false

# H2 Console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

logging.level.ch.jp.shooting=DEBUG

# OTA: tests serve from a temp dir, never the repo working directory
ota.base-url=http://localhost:8080
ota.artifact-dir=${java.io.tmpdir}/smartground-ota-test
