<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Solo: Thick center, alternating white gaps and black rings -->

  <!-- Thick center -->
  <circle cx="50" cy="50" r="14" fill="currentColor"/>

  <!-- White line (normal) -->
