server {
    listen 80;
    listen 443 ssl;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Same-origin API: forward /api to the backend container over the internal
    # docker network. "app" resolves via docker DNS on the smartground network.
    location /api/ {
        proxy_pass http://app:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Browser talks to nginx same-origin; don't leak its Origin to the
        # backend or Spring's CORS filter rejects the LAN IP with a 403.
        proxy_set_header Origin "";
    }

    # STOMP/SockJS WebSocket (backend endpoint: /ws/shooting). Not yet wired on
    # the frontend, but the upgrade plumbing is ready for when it is.
    location /ws/ {
        proxy_pass http://app:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header Origin "";
        proxy_read_timeout 3600s;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}