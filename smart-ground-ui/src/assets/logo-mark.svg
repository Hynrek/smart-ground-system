<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" role="img" aria-label="Smart Ground">
  <!-- Pins and body inherit the brand color (recolors per palette), fall back to navy -->
  <g stroke="var(--sg-brand, #1a1a2e)" stroke-width="5" stroke-linecap="round">
    <line x1="45" y1="18" x2="45" y2="34"/><line x1="60" y1="18" x2="60" y2="34"/><line x1="75" y1="18" x2="75" y2="34"/>
    <line x1="45" y1="86" x2="45" y2="102"/><line x1="60" y1="86" x2="60" y2="102"/><line x1="75" y1="86" x2="75" y2="102"/>
    <line x1="18" y1="45" x2="34" y2="45"/><line x1="18" y1="60" x2="34" y2="60"/><line x1="18" y1="75" x2="34" y2="75"/>
    <line x1="86" y1="45" x2="102" y2="45"/><line x1="86" y1="60" x2="102" y2="60"/><line x1="86" y1="75" x2="102" y2="75"/>
  </g>
  <rect x="34" y="34" width="52" height="52" rx="7" fill="none" stroke="var(--sg-brand, #1a1a2e)" stroke-width="6"/>
  <!-- Distinct solid core -->
  <rect x="49" y="49" width="22" height="22" rx="4" fill="var(--sg-brand, #1a1a2e)"/>
</svg>
