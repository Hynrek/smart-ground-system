<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" fill="none" role="img" aria-label="Smart Ground — Grounded in Innovation">
  <!-- ICON -->
  <g transform="translate(10,10)">
    <g stroke="var(--sg-brand, #1a1a2e)" stroke-width="5" stroke-linecap="round">
      <line x1="45" y1="18" x2="45" y2="34"/><line x1="60" y1="18" x2="60" y2="34"/><line x1="75" y1="18" x2="75" y2="34"/>
      <line x1="45" y1="86" x2="45" y2="102"/><line x1="60" y1="86" x2="60" y2="102"/><line x1="75" y1="86" x2="75" y2="102"/>
      <line x1="18" y1="45" x2="34" y2="45"/><line x1="18" y1="60" x2="34" y2="60"/><line x1="18" y1="75" x2="34" y2="75"/>
      <line x1="86" y1="45" x2="102" y2="45"/><line x1="86" y1="60" x2="102" y2="60"/><line x1="86" y1="75" x2="102" y2="75"/>
    </g>
    <rect x="34" y="34" width="52" height="52" rx="7" fill="none" stroke="var(--sg-brand, #1a1a2e)" stroke-width="6"/>
    <rect x="49" y="49" width="22" height="22" rx="4" fill="var(--sg-brand, #1a1a2e)"/>
  </g>
  <!-- WORDMARK -->
  <text x="150" y="58" font-family="'DM Sans', system-ui, sans-serif" font-weight="700" font-size="40" letter-spacing="8" fill="var(--sg-brand, #1a1a2e)">SMART</text>
  <text x="150" y="103" font-family="'DM Sans', system-ui, sans-serif" font-weight="700" font-size="40" letter-spacing="8" fill="var(--sg-brand, #1a1a2e)">GROUND</text>
  <!-- TAGLINE -->
  <text x="152" y="128" font-family="'DM Sans', system-ui, sans-serif" font-weight="400" font-size="15" letter-spacing="1.5" fill="var(--sg-text-muted, #718096)">Grounded in Innovation</text>
</svg>
