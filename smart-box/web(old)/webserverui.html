<!DOCTYPE html><html><head> <script>
            function toggleLed(state) {
                fetch('/led?state=' + state)
                    .then(response => response.text())
                    .then(data => {
                        document.getElementById('led-status').textContent = data;
                    });
            }

            function activateGpio() {
                const pin = document.getElementById('gpio-pin').value;
                const duration = document.getElementById('gpio-duration').value;
                fetch('/gpio?pin=' + pin + '&duration=' + duration)
                    .then(response => response.text())
                    .then(data => {
                        document.getElementById('gpio-status').textContent = data;
                    });
            }
        </script> <meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pico Control</title> <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }
            body {
                font-family: Arial, sans-serif;
                background: #1a1a2e;
                min-height: 100vh;
                padding: 20px;
            }
            .container {
                background: #fff;
                border-radius: 12px;
                padding: 24px;
                max-width: 320px;
                margin: 0 auto;
            }
            h1 {
                color: #333;
                font-size: 18px;
                text-align: center;
                margin-bottom: 4px;
            }
            .subtitle {
                color: #666;
                text-align: center;
                margin-bottom: 20px;
                font-size: 13px;
            }
            .section {
                border-top: 1px solid #eee;
                padding-top: 16px;
                margin-top: 16px;
            }
            .section:first-child {
                border-top: none;
                padding-top: 0;
                margin-top: 0;
            }
            h2 {
                color: #333;
                font-size: 14px;
                margin-bottom: 12px;
            }
            .form-group {
                margin-bottom: 12px;
            }
            label {
                display: block;
                color: #333;
                font-size: 13px;
                font-weight: bold;
                margin-bottom: 4px;
            }
            input, select {
                width: 100%;
                padding: 10px 12px;
                border: 2px solid #ddd;
                border-radius: 6px;
                font-size: 15px;
            }
            input:focus, select:focus {
                outline: none;
                border-color: #4f46e5;
            }
            .row {
                display: flex;
                gap: 8px;
            }
            .row .btn {
                flex: 1;
            }
            .btn {
                padding: 12px;
                background: #4f46e5;
                color: #fff;
                border: none;
                border-radius: 6px;
                font-size: 14px;
                font-weight: bold;
                cursor: pointer;
                text-align: center;
                text-decoration: none;
                display: inline-block;
            }
            .btn:active {
                background: #4338ca;
            }
            .btn.green { background: #22c55e; }
            .btn.green:active { background: #16a34a; }
            .btn.red { background: #ef4444; }
            .btn.red:active { background: #dc2626; }
        </style> </head><body><div class="container"><h1>Device Control</h1><p class="subtitle">Manage your Pico 2W</p><div class="section"><h2>LED</h2><div class="row"><button onclick="toggleLed('on')" class="btn green">ON</button><button onclick="toggleLed('off')" class="btn red">OFF</button></div><p id="led-status" style="margin-top:8px;font-size:12px;color:#666;text-align:center;"></p></div><div class="section"><h2>GPIO Output</h2><div class="form-group"><label>GPIO Pin</label><select id="gpio-pin"><option value="0">GP0</option><option value="1">GP1</option><option value="2">GP2</option><option value="3">GP3</option><option value="4">GP4</option><option value="5">GP5</option><option value="6">GP6</option><option value="7">GP7</option><option value="8">GP8</option><option value="9">GP9</option><option value="10">GP10</option><option value="11">GP11</option><option value="12">GP12</option><option value="13">GP13</option><option value="14">GP14</option><option value="15">GP15</option><option value="16">GP16</option><option value="17">GP17</option><option value="18">GP18</option><option value="19">GP19</option><option value="20">GP20</option><option value="21">GP21</option><option value="22">GP22</option><option value="23">GP23</option><option value="24">GP24</option><option value="25">GP25</option></select></div><div class="form-group"><label>Duration (seconds)</label><input type="number" id="gpio-duration" placeholder="1" min="1" max="300" value="1"></div><button onclick="activateGpio()" class="btn" style="width:100%">Activate</button><p id="gpio-status" style="margin-top:8px;font-size:12px;color:#666;text-align:center;"></p></div></div></body></html>
