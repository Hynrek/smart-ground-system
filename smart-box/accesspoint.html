<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pico 2W Setup</title> <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }
            body {
                font-family: Arial, sans-serif;
                background: #1a1a2e;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
            }
            .container {
                background: #fff;
                border-radius: 12px;
                padding: 24px;
                width: 100%;
                max-width: 320px;
            }
            h1 {
                color: #333;
                font-size: 20px;
                text-align: center;
                margin-bottom: 4px;
            }
            .subtitle {
                color: #666;
                text-align: center;
                margin-bottom: 20px;
                font-size: 13px;
            }
            .form-group {
                margin-bottom: 14px;
            }
            label {
                display: block;
                color: #333;
                font-size: 13px;
                font-weight: bold;
                margin-bottom: 4px;
            }
            input {
                width: 100%;
                padding: 10px 12px;
                border: 2px solid #ddd;
                border-radius: 6px;
                font-size: 15px;
            }
            input:focus {
                outline: none;
                border-color: #4f46e5;
            }
            button {
                width: 100%;
                padding: 12px;
                background: #4f46e5;
                color: #fff;
                border: none;
                border-radius: 6px;
                font-size: 15px;
                font-weight: bold;
                cursor: pointer;
                margin-top: 6px;
            }
            button:active {
                background: #4338ca;
            }
            .hint {
                color: #888;
                font-size: 11px;
                margin-top: 3px;
            }
        </style> </head><body><div class="container"><h1>Wi-Fi Setup</h1><p class="subtitle">Configure your Pico 2W</p><form action="/save" method="get"><div class="form-group"><label>Device Name</label><input type="text" name="client_network_name" placeholder="e.g. Kitchen" required><p class="hint">Network: [name]_[mac]</p></div><div class="form-group"><label>Wi-Fi Network</label><input type="text" name="client_network_ssid" placeholder="YourWiFi" required></div><div class="form-group"><label>Wi-Fi Password</label><input type="password" name="client_network_pw" placeholder="Password" required></div><div class="form-group"><label>Box-API URL</label><input type="text" name="box_api_base_url" placeholder="https://192.168.4.1:8443" required></div><button type="submit">Save & Connect</button></form></div></body></html>
