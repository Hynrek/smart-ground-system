hub.base-url=http://localhost:8080
spring.datasource.url=jdbc:h2:file:${user.home}/.smartground-node/box-registry;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Renders any ErrorResponse-implementing exception (incl. ErrorResponseException) as a real
# application/problem+json body with its ProblemDetail (type/title/detail/status), instead of
# falling back to HttpServletResponse.sendError, which does not serialize ProblemDetail at all.
spring.mvc.problemdetails.enabled=true
# Port 8443, not 8080: the Hub already claims 8080 and, per the architecture, Hub and Node
# run as two processes on the same machine at N=1.
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:node-dev-keystore.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=${NODE_KEYSTORE_PASSWORD:changeit}
server.ssl.key-alias=smartground-node
# Onboarding: Node-eigene MAC (fuer den ESP-NOW-Frame-Header) und der Access-Point,
# den die Box waehrend der Provisionierung nutzt (siehe #9 fuer die echte AP-Inbetriebnahme).
onboarding.node-mac=30:AE:A4:1F:2B:3C
onboarding.ap-ssid=SmartGround-Node
onboarding.ap-psk=${NODE_AP_PSK:changeit}
onboarding.box-api-url=https://192.168.4.1:8443
