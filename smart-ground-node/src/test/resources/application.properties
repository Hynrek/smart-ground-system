# Test-Override: ALLE Node-Tests (@SpringBootTest) sollen gegen eine In-Memory-H2 laufen, NIE gegen
# die echte datei-basierte Dev-DB (${user.home}/.smartground-node/box-registry, siehe main resources).
# Ohne das schrieb jeder volle `mvn test`-Lauf echte Zeilen in die Entwickler-DB, ausserhalb jeder
# @Transactional-Rollback-Grenze fuer Schema-Aenderungen (create-drop). Klassen mit eigenem
# @SpringBootTest(properties = {...}) (SyncedSerieRepositoryTest, SyncStateRepositoryTest) ueberschreiben
# diese Datei weiterhin: Spring's klassenweite `properties`-Attribut hat Vorrang vor
# src/test/resources/application.properties.
spring.datasource.url=jdbc:h2:mem:node-test;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.mvc.problemdetails.enabled=true

hub.base-url=http://localhost:8080

server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:node-dev-keystore.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=${NODE_KEYSTORE_PASSWORD:changeit}
server.ssl.key-alias=smartground-node

jwt.secret=${JWT_SECRET:bWVpbi1zZWNyZXQta2V5LWZ1ZXItc21hcnQtZ3JvdW5kLWlzdC1sYW5n}
onboarding.node-mac=${ONBOARDING_NODE_MAC:30:ae:a4:1f:2b:3c}
onboarding.ap-ssid=${ONBOARDING_AP_SSID:SmartGround-Node-1}
onboarding.ap-psk=${ONBOARDING_AP_PSK:provision-pw-123}
onboarding.box-api-url=${ONBOARDING_BOX_API_URL:https://192.168.4.1:8443}
onboarding.token-ttl-seconds=${ONBOARDING_TOKEN_TTL_SECONDS:300}

node-channel.hub-url=${NODE_CHANNEL_HUB_URL:ws://localhost:8080/node-channel}
node-channel.node-id=${NODE_CHANNEL_NODE_ID:node-1}
node-channel.token=${NODE_CHANNEL_TOKEN:secret}

# Sync-Fundament (#2): auf 1h gesetzt, damit SerieSyncScheduler waehrend eines Testlaufs (Sekunden bis
# wenige Minuten) garantiert nie tickt — einfachste Absicherung ohne zusaetzliche Profil-/Bean-Logik.
sync.serie.interval-ms=3600000
