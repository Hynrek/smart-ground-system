# Mosquitto configuration for SmartGround
#
# TLS + Dynamic Security Plugin hardening (Phase 1 of mqtt-tls-client-auth).
# No anonymous access; auth/ACLs are managed at runtime via the
# dynamic-security plugin ($CONTROL/dynamic-security/# over MQTT), not a
# static password_file. See ../.superpowers/sdd/task-A-report.md and
# README.md for the cert/bootstrap story.

per_listener_settings false
allow_anonymous false

persistence false
log_dest stdout
log_timestamp true
log_type error
log_type warning
log_type notice
log_type information

# Internal, plaintext listener. NOT published to the host — see
# docker-compose.yml, which only publishes 8883. Mosquitto itself binds this
# on all interfaces inside its own container regardless of this directive;
# the isolation boundary (host/internet cannot reach 1883) is enforced at
# the compose layer by omitting the port mapping, not here. Other containers
# on the `smartground` Docker network (e.g. the backend, until Task B moves
# it to TLS) can still reach it at mosquitto:1883.
listener 1883

# TLS listener — the only one published to the host (see docker-compose.yml).
# Certs are generated at container startup (mosquitto/docker-entrypoint.sh)
# into the mosquitto_certs volume, mounted read-write here at
# /mosquitto/config/certs. Task B/C: mount that same volume read-only to
# get ca.crt for client-side trust.
listener 8883
certfile /mosquitto/config/certs/server.crt
keyfile /mosquitto/config/certs/server.key
cafile /mosquitto/config/certs/ca.crt
tls_version tlsv1.2

# Dynamic Security plugin: authentication + per-role ACLs managed via
# mosquitto_ctrl / $CONTROL/dynamic-security/#, replacing allow_anonymous.
# .so path verified against eclipse-mosquitto:2 (2.1.2) directly:
#   docker run --rm --entrypoint sh eclipse-mosquitto:2 \
#     -c "find / -iname '*dynamic_security*'"
# -> /usr/lib/mosquitto_dynamic_security.so
plugin /usr/lib/mosquitto_dynamic_security.so
plugin_opt_config_file /mosquitto/config/dynsec/dynamic-security.json
